<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grand Gallery — Artwork Guessing Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209; --parchment: #f5efe0; --gold: #c9a84c;
    --gold-light: #e8d08a; --deep: #2d1f0e; --cream: #faf6ec;
    --red: #8b1a1a; --muted: #7a6b55; --frame: #3d2b1a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background-color:var(--deep);
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(201,168,76,.04) 40px,rgba(201,168,76,.04) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(201,168,76,.04) 40px,rgba(201,168,76,.04) 41px);
    font-family:'Cormorant Garamond',serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 16px 60px;
  }
  header { text-align:center; padding:36px 20px 18px; width:100%; max-width:680px; }
  .gallery-name {
    font-family:'Playfair Display',serif; font-size:clamp(.85rem,2.5vw,1rem);
    letter-spacing:.35em; text-transform:uppercase; color:var(--gold); margin-bottom:8px;
  }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(1.9rem,5.5vw,3.2rem); color:var(--parchment); line-height:1.1; }
  h1 em { font-style:italic; color:var(--gold-light); }
  .divider { display:flex; align-items:center; gap:12px; margin:14px auto; width:200px; color:var(--gold); }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--gold); opacity:.5; }
  .scoreboard { display:flex; gap:28px; justify-content:center; }
  .score-item { text-align:center; color:var(--parchment); }
  .score-item .value { font-family:'Playfair Display',serif; font-size:1.9rem; color:var(--gold); display:block; line-height:1; }
  .score-item .label { font-size:.72rem; letter-spacing:.2em; text-transform:uppercase; opacity:.6; }
  .progress-bar-wrap { width:100%; max-width:680px; height:4px; background:rgba(255,255,255,.08); margin:18px 0; }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); transition:width .5s ease; }
  .game-card {
    background:var(--cream); width:100%; max-width:680px;
    box-shadow:0 0 0 6px var(--frame),0 0 0 10px var(--gold),0 0 0 14px var(--frame),0 30px 60px rgba(0,0,0,.7);
    overflow:hidden; animation:cardIn .6s ease forwards;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .painting-area { background:var(--frame); padding:14px; position:relative; }
  .painting-inner {
    background:#111; position:relative; min-height:220px;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .artwork-img { width:100%; max-height:420px; object-fit:contain; display:block; background:#111; }
  .painting-area::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:2;
    background:linear-gradient(to bottom right,rgba(255,255,255,.06) 0%,transparent 50%),
               linear-gradient(to bottom left,rgba(0,0,0,.12) 0%,transparent 50%);
  }
  .artwork-number {
    position:absolute; bottom:18px; right:18px; background:var(--frame);
    border:1px solid var(--gold); color:var(--gold);
    font-family:'Playfair Display',serif; font-size:.78rem; letter-spacing:.15em; padding:4px 10px; z-index:3;
  }
  .question-section { padding:24px 28px 16px; border-bottom:1px solid rgba(61,43,26,.15); }
  .question-label { font-size:.7rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .question-text { font-family:'Playfair Display',serif; font-size:clamp(1rem,2.8vw,1.35rem); color:var(--deep); font-style:italic; line-height:1.4; }
  .choices-grid { padding:18px 28px 24px; display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .choice-btn {
    background:var(--parchment); border:1.5px solid rgba(61,43,26,.2); color:var(--deep);
    font-family:'Cormorant Garamond',serif; font-size:clamp(.82rem,2vw,.98rem);
    padding:11px 13px; cursor:pointer; text-align:left; line-height:1.35;
    transition:all .2s ease; position:relative; overflow:hidden;
  }
  .choice-btn::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:3px; background:var(--gold); transform:scaleY(0); transition:transform .2s ease;
  }
  .choice-btn:hover:not(:disabled) { background:#ede5cf; border-color:var(--gold); transform:translateX(3px); }
  .choice-btn:hover:not(:disabled)::before { transform:scaleY(1); }
  .choice-btn.correct { background:#2e4a2e; border-color:#4a8a4a; color:#c8eec8; animation:pulse-green .4s ease; }
  .choice-btn.correct::before { background:#4a8a4a; transform:scaleY(1); }
  .choice-btn.wrong { background:#4a1a1a; border-color:var(--red); color:#e8a0a0; }
  .choice-btn.wrong::before { background:var(--red); transform:scaleY(1); }
  .choice-btn.reveal { background:#2a3a2a; border-color:#5a9a5a; color:#b0ddb0; }
  .choice-btn:disabled { cursor:default; }
  @keyframes pulse-green { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  .feedback {
    padding:14px 28px; min-height:58px; display:none;
    align-items:center; gap:12px;
    border-top:1px solid rgba(61,43,26,.12); background:var(--cream);
  }
  .feedback-icon { font-size:1.5rem; flex-shrink:0; }
  .feedback-title { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:2px; }
  .feedback-title.correct { color:#3a7a3a; }
  .feedback-title.wrong { color:var(--red); }
  .feedback-detail { font-size:.88rem; color:var(--muted); font-style:italic; }
  .next-btn {
    margin:0 28px 24px; width:calc(100% - 56px); padding:13px;
    background:var(--frame); color:var(--gold); border:1px solid var(--gold);
    font-family:'Playfair Display',serif; font-size:.95rem; letter-spacing:.15em;
    cursor:pointer; text-transform:uppercase; transition:all .2s ease; display:none;
  }
  .next-btn:hover { background:var(--gold); color:var(--frame); }
  .final-screen {
    background:var(--cream); width:100%; max-width:680px;
    box-shadow:0 0 0 6px var(--frame),0 0 0 10px var(--gold),0 0 0 14px var(--frame),0 30px 60px rgba(0,0,0,.7);
    padding:52px 40px 48px; text-align:center; display:none; animation:cardIn .6s ease forwards;
  }
  .final-medal { font-size:4rem; margin-bottom:16px; }
  .final-title { font-family:'Playfair Display',serif; font-size:clamp(1.7rem,4.5vw,2.4rem); color:var(--deep); margin-bottom:8px; }
  .final-score { font-family:'Playfair Display',serif; font-size:clamp(2.8rem,7vw,4.5rem); color:var(--gold); line-height:1; margin:14px 0 6px; }
  .final-subtitle { font-size:1rem; color:var(--muted); font-style:italic; margin-bottom:28px; }
  .grade-badge {
    display:inline-block; border:2px solid var(--gold); color:var(--deep);
    font-family:'Playfair Display',serif; font-size:.95rem; letter-spacing:.15em;
    padding:7px 26px; margin-bottom:30px; text-transform:uppercase;
  }
  .play-again-btn {
    padding:13px 44px; background:var(--frame); color:var(--gold); border:1px solid var(--gold);
    font-family:'Playfair Display',serif; font-size:.95rem; letter-spacing:.15em;
    cursor:pointer; text-transform:uppercase; transition:all .2s ease;
  }
  .play-again-btn:hover { background:var(--gold); color:var(--frame); }
  @media(max-width:480px) {
    .choices-grid { grid-template-columns:1fr; padding:12px 18px 18px; }
    .question-section { padding:18px 18px 14px; }
    .feedback { padding:12px 18px; }
    .next-btn { margin:0 18px 18px; width:calc(100% - 36px); }
  }
</style>
</head>
<body>

<header>
  <p class="gallery-name">The Grand Gallery</p>
  <h1>Name the <em>Artwork</em></h1>
  <div class="divider">✦</div>
  <div class="scoreboard">
    <div class="score-item"><span class="value" id="scoreVal">0</span><span class="label">Correct</span></div>
    <div class="score-item"><span class="value" id="questionVal">1</span><span class="label">Question</span></div>
    <div class="score-item"><span class="value" id="totalVal">30</span><span class="label">Total</span></div>
  </div>
</header>

<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

<div class="game-card" id="gameCard">
  <div class="painting-area">
    <div class="painting-inner">
      <img class="artwork-img" id="artworkImg" alt="Artwork to identify" />
    </div>
    <div class="artwork-number" id="artworkNum">1 / 30</div>
  </div>
  <div class="question-section">
    <p class="question-label">Identify the Painting</p>
    <p class="question-text">What is the name of this artwork?</p>
  </div>
  <div class="choices-grid" id="choicesGrid"></div>
  <div class="feedback" id="feedback">
    <span class="feedback-icon" id="feedbackIcon"></span>
    <div>
      <div class="feedback-title" id="feedbackTitle"></div>
      <div class="feedback-detail" id="feedbackDetail"></div>
    </div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Continue to Next →</button>
</div>

<div class="final-screen" id="finalScreen">
  <div class="final-medal" id="finalMedal">🖼️</div>
  <h2 class="final-title">The Exhibition Ends</h2>
  <div class="final-score" id="finalScore">0/30</div>
  <div class="final-subtitle" id="finalSubtitle"></div>
  <div class="grade-badge" id="gradeBadge"></div><br><br>
  <button class="play-again-btn" onclick="restartGame()">View Another Exhibition</button>
</div>

let questions = [], currentQ = 0, score = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuestions() {
  return shuffle(ALL_ARTWORKS).map(correct => ({
    correct,
    choices: shuffle([correct, ...shuffle(ALL_ARTWORKS.filter(a=>a.title!==correct.title)).slice(0,3)])
  }));
}

function startGame() {
  questions = buildQuestions();
  currentQ = 0; score = 0;
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('totalVal').textContent = questions.length;
  document.getElementById('gameCard').style.display = 'block';
  document.getElementById('finalScreen').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('artworkImg').src = q.correct.url;
  document.getElementById('artworkNum').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('questionVal').textContent = currentQ+1;
  document.getElementById('progressBar').style.width = `${(currentQ/total)*100}%`;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';
  q.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.title;
    btn.onclick = () => handleAnswer(choice.title, q.correct.title, btn);
    grid.appendChild(btn);
  });

  const card = document.getElementById('gameCard');
  card.style.animation = 'none'; void card.offsetWidth; card.style.animation = 'cardIn .5s ease forwards';
}

function handleAnswer(chosen, correct, clickedBtn) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === correct && btn !== clickedBtn) btn.classList.add('reveal');
  });
  const fb = document.getElementById('feedback');
  fb.style.display = 'flex';
  if (chosen === correct) {
    score++;
    document.getElementById('scoreVal').textContent = score;
    clickedBtn.classList.add('correct');
    document.getElementById('feedbackIcon').textContent = '✦';
    document.getElementById('feedbackTitle').textContent = 'Correct!';
    document.getElementById('feedbackTitle').className = 'feedback-title correct';
    document.getElementById('feedbackDetail').textContent = `"${correct}" — well identified.`;
  } else {
    clickedBtn.classList.add('wrong');
    document.getElementById('feedbackIcon').textContent = '✗';
    document.getElementById('feedbackTitle').textContent = 'Incorrect';
    document.getElementById('feedbackTitle').className = 'feedback-title wrong';
    document.getElementById('feedbackDetail').textContent = `The correct answer was "${correct}".`;
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showFinal();
  else renderQuestion();
}

function showFinal() {
  document.getElementById('gameCard').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  const total = questions.length, pct = score/total;
  let medal, grade, subtitle;
  if (pct===1)       { medal='🏆'; grade='Grand Master Connoisseur'; subtitle='A perfect score — the galleries bow before you.'; }
  else if (pct>=0.8) { medal='🥇'; grade='Distinguished Scholar';   subtitle='An impressive command of the canon.'; }
  else if (pct>=0.6) { medal='🥈'; grade='Aspiring Curator';        subtitle='A promising eye for the masterworks.'; }
  else if (pct>=0.4) { medal='🎨'; grade='Casual Visitor';          subtitle='The gallery awaits your return.'; }
  else               { medal='🖼️'; grade='First-Time Guest';         subtitle='Every great connoisseur begins somewhere.'; }
  document.getElementById('finalMedal').textContent = medal;
  document.getElementById('finalScore').textContent = `${score}/${total}`;
  document.getElementById('gradeBadge').textContent = grade;
  document.getElementById('finalSubtitle').textContent = subtitle;
  const fs = document.getElementById('finalScreen');
  fs.style.display = 'block'; fs.style.animation = 'none'; void fs.offsetWidth; fs.style.animation = 'cardIn .6s ease forwards';
}
